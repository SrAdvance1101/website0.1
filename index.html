<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Llanera Mariara | Musica para Todos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ENTRADA RÁPIDA Y FLUIDA --- */
        @keyframes fadeInPage {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        html { scroll-behavior: smooth; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #fdfbf7;
            color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            animation: fadeInPage 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        /* --- FONDO DE COLORES ESTÁTICOS Y VIBRANTES --- */
        .bg-gradient-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #fdfbf7;
            overflow: hidden;
        }

        .gradient-sphere {
            position: absolute;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(70px); 
            opacity: 0.8; /* 2. Colores que se notan más (mayor opacidad) */
            /* 1. Se eliminó la animación moveLiquid */
        }

        /* Colores más intensos para que se noten más */
        .sphere-1 { background: radial-gradient(circle, #ffeb3b, transparent); top: -15%; left: -10%; }
        .sphere-2 { background: radial-gradient(circle, #8d6e63, transparent); bottom: -15%; right: -5%; }
        .sphere-3 { background: radial-gradient(circle, #2196f3, transparent); top: 20%; left: 35%; }
        .sphere-4 { background: radial-gradient(circle, #ff5722, transparent); bottom: 10%; left: -5%; }

        /* NAVBAR SUPERIOR */
        .navbar {
            position: sticky;
            top: 15px;
            width: 92%;
            max-width: 1100px;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .nav-logo { font-weight: 800; color: #333; font-size: 1.3rem; }

        .search-box { 
            background: #f2f0eb; 
            padding: 6px 15px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center;
            width: 120px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-box:focus-within { width: 200px; background: white; border: 1px solid #42a5f5; }
        .search-box input { background: transparent; border: none; outline: none; width: 100%; color: #333; }

        /* TARJETAS */
        .container { width: 90%; max-width: 800px; z-index: 2; padding-bottom: 30px; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.02);
        }

        h2 { font-size: 1.6rem; text-align: center; margin: 0 0 15px 0; color: #333; }
        p { color: #555; line-height: 1.6; font-size: 1rem; margin: 0; }

        /* FOOTER NAV - 3. Botones reemplazados y en una sola línea */
        .footer-nav {
            width: 92%;
            max-width: 650px; 
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            justify-content: space-evenly; 
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            z-index: 1000;
        }

        .mini-card {
            background: #f9f9f9;
            padding: 10px 12px;
            flex: 1; 
            max-width: 140px;
            border-radius: 8px;
            text-decoration: none;
            color: #555;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .mini-card:hover { 
            background: white; 
            color: #25d366; /* Color sugerido para contacto/whatsapp */
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-color: #25d366;
        }

        /* Color específico para Dev Team al pasar el mouse */
        .mini-card.dev-btn:hover {
            color: #42a5f5;
            border-color: #42a5f5;
        }

        @media (max-width: 600px) {
            .footer-nav { gap: 4px; padding: 8px; }
            .mini-card { padding: 8px 4px; font-size: 0.65rem; gap: 3px; }
            .mini-card i { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient-wrapper">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
        <div class="gradient-sphere sphere-4"></div>
    </div>
    
    <nav class="navbar">
        <div class="nav-logo">Alma Llanera</div>
        <div class="search-box">
            <input type="text" placeholder="Buscar...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <center><h2>Bienvenidos a la Web Oficial de Alma Llanera</h2></center>
            <p>En Desarrollo...</p>
        </div>
        
        <div class="card">
            <center><h2>Sobre Nosotros</h2></center>
            <p>En Desarrollo...</p>
        </div>

        <div class="card">
            <center><h2>Galería</h2></center>
            <p style="text-align: center;">Todo el contenido está organizado en una estructura ligera y profesional.</p>
        </div>
    </div>

    <nav class="footer-nav">
        <a href="#" class="mini-card"><i class="fa-brands fa-whatsapp"></i> Contacto</a>
        <a href="#" class="mini-card"><i class="fa-brands fa-instagram"></i> Instagram</a>
        <a href="#" class="mini-card"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <a href="#" class="mini-card dev-btn"><i class="fa-solid fa-code"></i> Dev™</a>
    </nav>

</body>
</html>
